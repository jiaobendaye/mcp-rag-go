# MCP-RAG Configuration
# All values shown are defaults. Override with MCP_RAG_* environment variables.

# HTTP Server
http_port: 8060

# Elasticsearch
es_url: "http://localhost:9200"

# Embedding Provider (local Ollama)
embedding_provider: "ollama"
embedding_model: "mxbai-embed-large"
embedding_base_url: "http://localhost:11434/v1"
# embedding_api_key: ""      # Ollama doesn't need API key

# LLM Provider
llm_provider: "openai"
llm_model: "deepseek-v4-flash"
llm_base_url: "https://zhi8.xf.bj.cn/onehub/v1"
# llm_api_key: set via MCP_RAG_LLM_API_KEY env var (see .env)

# RAG Parameters
chunk_size: 4000       # characters per chunk
chunk_overlap: 200     # overlap between chunks
top_k: 5               # max search results
min_score: 0.2         # minimum similarity threshold (hybrid BM25+knn)
search_mode: "hybrid"  # "hybrid" (manual KNN+BM25 fusion, free) | "rrf" (native, needs license) | "knn" (vector only)

# Security (disabled by default, enable for production)
# security_enabled: true
# security_allow_anonymous: false
# security_api_keys: ["sk-your-key"]
# security_tenant_api_keys:
#   tenant1: ["sk-tenant1-key"]

# Rate Limiting
# rate_limit_requests_per_window: 120
# rate_limit_window_seconds: 60
# rate_limit_burst: 30

# Upload Quotas
# quota_max_upload_files: 20
# quota_max_upload_bytes: 52428800     # 50MB
# quota_max_upload_file_bytes: 10485760 # 10MB

# Index Quotas
# quota_max_index_documents: 500
# quota_max_index_chunks: 2000
# quota_max_index_chars: 500000
